<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מוזיאון האשליות: פרשת הקש השבור 🕵️‍♂️</title>
    
    <style>
        /* CSS Style */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 800px;
            width: 95%;
            text-align: center;
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }
        h1 { color: #e94560; margin-bottom: 10px; }
        .controls {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #0f3460;
            padding: 15px;
            border-radius: 12px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        canvas {
            background: #fff;
            border: 4px solid #e94560;
            cursor: crosshair;
            border-radius: 10px;
            max-width: 100%;
        }
        #status-bar { margin: 20px 0; font-size: 1.2em; color: #4db8ff; }
        .audio-controls {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid #4db8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background-color: #ff5e78; transform: scale(1.05); }
        input[type="range"] { accent-color: #4db8ff; cursor: pointer; }
        .volume-container { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>חוק סנל</h1>
        <p>תזיז את העכבר כדי לראות איך הקרן אור משפיעה על השבירה בחומרים שונים</p>

        <div class="controls">
            <div class="control-group">
                <label>חומר עליון n1:</label>
                <select id="n1">
                    <option value="1">אוויר (1.0)</option>
                    <option value="1.33">מים (1.33)</option>
                    <option value="1.5">זכוכית (1.5)</option>
                    <option value="2.4" selected>יהלום (2.4)</option>
                </select>
            </div>
            <div class="control-group">
                <label>חומר תחתון n2:</label>
                <select id="n2">
                    <option value="1">אוויר (1.0)</option>
                    <option value="1.33">מים (1.33)</option>
                    <option value="1.5" selected>זכוכית (1.5)</option>
                    <option value="2.4">יהלום (2.4)</option>
                </select>
            </div>
        </div>

        <canvas id="opticsCanvas"></canvas>

        <div id="status-bar">
            זווית פגיעה: <span id="angle-in">0</span>° | זווית שבירה:
            <span id="angle-out">0</span>°
        </div>

        <div class="audio-controls">
            <audio id="bgMusic" loop>
                <source src="anatoli-funk.mp4" type="audio/mpeg" />
            </audio>
            <button onclick="toggleMusic()" id="playBtn">נגן מוזיקה 🎵</button>
            <button onclick="restartMusic()">התחל מחדש 🔄</button>
            <div class="volume-container">
                <label>ווליום:</label>
                <input
                    type="range"
                    id="volumeSlider"
                    min="0"
                    max="1"
                    step="0.1"
                    value="0.5"
                    oninput="changeVolume(this.value)"
                />
            </div>
        </div>
    </div>

    <script>
        // JavaScript Logic
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        const n1Select = document.getElementById('n1');
        const n2Select = document.getElementById('n2');
        const music = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');

        canvas.width = 600;
        canvas.height = 400;

        let mX = 150;
        let mY = 100;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mX = e.clientX - rect.left;
            mY = e.clientY - rect.top;
            draw();
        });

        n1Select.onchange = draw;
        n2Select.onchange = draw;

        function draw() {
            const n1 = parseFloat(n1Select.value);
            const n2 = parseFloat(n2Select.value);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // רקע חומרים
            ctx.fillStyle = "#e0f7fa"; ctx.fillRect(0, 0, canvas.width, centerY);
            ctx.fillStyle = "#b2ebf2"; ctx.fillRect(0, centerY, canvas.width, centerY);

            // קו הפרדה ואנך
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();
            
            ctx.setLineDash([5, 5]); ctx.strokeStyle = "#666";
            ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();
            ctx.setLineDash([]);

            if (mY >= centerY) return;

            // חישוב וקטור הכניסה
            let dx = mX - centerX;
            let dy = centerY - mY;
            
            // זווית פגיעה (theta1)
            let theta1 = Math.atan2(dx, dy);

            // 1. קרן פוגעת (אדומה)
            ctx.strokeStyle = "red"; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(mX, mY);
            ctx.lineTo(centerX, centerY);
            ctx.stroke();

            // 2. חישוב חוק סנל
            let sinTheta2 = (n1 * Math.sin(theta1)) / n2;
            
            if (Math.abs(sinTheta2) <= 1) {
                let theta2 = Math.asin(sinTheta2);
                
                ctx.strokeStyle = "orange";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                
                // התיקון שהוספת: הפיכת סימן ה-Sin כדי שהקרן תחצה לצד השני
                ctx.lineTo(centerX - Math.sin(theta2) * 500, centerY + Math.cos(theta2) * 500);
                ctx.stroke();
                
                document.getElementById('angle-in').innerText = Math.abs(theta1 * 180 / Math.PI).toFixed(1);
                document.getElementById('angle-out').innerText = Math.abs(theta2 * 180 / Math.PI).toFixed(1);
            } else {
                // החזרה גמורה
                ctx.strokeStyle = "purple";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX - dx, centerY - dy); 
                ctx.stroke();
                document.getElementById('angle-out').innerText = "החזרה גמורה!";
            }
        }

        // פונקציות מוזיקה
        function toggleMusic() {
            if (music.paused) { 
                music.play(); 
                playBtn.innerText = "עצור מוזיקה ⏸️"; 
            } else { 
                music.pause(); 
                playBtn.innerText = "נגן מוזיקה 🎵"; 
            }
        }
        
        function restartMusic() { 
            music.currentTime = 0; 
            music.play(); 
            playBtn.innerText = "עצור מוזיקה ⏸️";
        }
        
        function changeVolume(val) { 
            music.volume = val; 
        }

        // קריאה ראשונה לציור
        draw();
    </script>
</body>
</html>
