<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>sybau</title>️
    <link rel="stylesheet" href="look.css">
</head>
<body>
    <div class="container">
        <h1>חוק סנל</h1>
        <p>שתמש בעכבר כדי לירות את הקרן אור</p>
        
        <div class="controls">
            <div class="control-group">
                <label>חומר עליון n1:</label>
                <select id="n1">
                    <option value="1">אוויר</option>
                    <option value="1.33">מים</option>
                    <option value="1.5">זכוכית</option>
                </select>
            </div>
            <div class="control-group">
                <label>חומר תחתון n2:</label>
                <select id="n2" selected="1.5">
                    <option value="1">אוויר</option>
                    <option value="1.33">מים</option>
                    <option value="1.5" selected>זכוכית</option>
                    <option value="2.4">יהלום</option>
                </select>
            </div>
        </div>

        <canvas id="opticsCanvas"></canvas>
        
        <div id="status-bar">
            זווית פגיעה: <span id="angle-in">0</span>° | זווית שבירה: <span id="angle-out">0</span>°
        </div>
    </div>
    <script src="logi.js"></script>
</body>
</html>
